<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<title>Dashboard Flotta 2025</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:30px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.filters select,button{
padding:6px;
margin-right:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
}

.kpi{
font-size:18px;
margin-right:25px;
}

</style>

</head>

<body>

<div class="container">

<h2>Dashboard Flotta 2025</h2>

<div class="card filters">

<select id="monthFilter">
<option value="1">Gennaio</option>
<option value="2">Febbraio</option>
<option value="3">Marzo</option>
<option value="4">Aprile</option>
<option value="5">Maggio</option>
<option value="6">Giugno</option>
<option value="7">Luglio</option>
<option value="8">Agosto</option>
<option value="9">Settembre</option>
<option value="10">Ottobre</option>
<option value="11">Novembre</option>
<option value="12">Dicembre</option>
</select>

<select id="categoryFilter">
<option value="all">Categoria</option>
</select>

<select id="locationFilter">
<option value="all">Sede</option>
</select>

<button onclick="applyFilters()">Aggiorna</button>

<button onclick="exportCSV()">Export CSV</button>

</div>

<div class="card">

<span class="kpi">Canone: <b id="kpiCanone">0</b></span>

<span class="kpi">Assicurazione: <b id="kpiAssicurazione">0</b></span>

<span class="kpi">Totale: <b id="kpiTotale">0</b></span>

<span class="kpi">Veicoli: <b id="kpiCount">0</b></span>

</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">

<table id="table">

<thead>

<tr>
<th>Targa</th>
<th>Categoria</th>
<th>Sede</th>
<th>Canone</th>
<th>Assicurazione</th>
<th>Totale</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

let fleet=[]
let locationMap={}
let vehicles=[]
let filtered=[]
let chart

/* PARSE MONEY */

function parseMoney(v){

if(!v) return 0

return parseFloat(
String(v)
.replace("€","")
.replace(",",".")
.replace(/\s/g,"")
) || 0

}

/* PARSE DATE ITA */

function parseDate(v){

if(!v) return null

let mesi={
gen:0,feb:1,mar:2,apr:3,mag:4,giu:5,
lug:6,ago:7,set:8,ott:9,nov:10,dic:11
}

if(v.includes("-")){

let p=v.split("-")

let m=mesi[p[0].toLowerCase()]

let y="20"+p[1]

return new Date(y,m,1)

}

return new Date(v)

}

/* LOAD PRENOTAZIONI */

fetch("prenotazioni.json")
.then(r=>r.json())
.then(data=>{

data.forEach(row=>{

let plate=String(row["Auto"]||"").trim().toUpperCase()

let loc=row["Sucursal Entrega"]

if(plate && loc){

locationMap[plate]=loc

}

})

loadFleet()

})
.catch(()=>loadFleet())

/* LOAD CSV FLOTTA */

function loadFleet(){

Papa.parse("FLOTTA_3.csv",{

download:true,
header:true,
delimiter:";",

complete:(res)=>{

fleet=res.data

prepareVehicles()

populateFilters()

applyFilters()

}

})

}

/* PREPARA VEICOLI */

function prepareVehicles(){

vehicles=[]

fleet.forEach(r=>{

let plate=String(r["license_plate"]||"").trim().toUpperCase()

if(!plate) return

vehicles.push({

plate:plate,
category:r["category"],
location:locationMap[plate] || "Sconosciuta",
dateIn:r["Date In"],
dateOut:r["Date Out"],
canone:parseMoney(r[" Canone imponibile "]),
assicurazione:parseMoney(r[" Canone assicurazione "])

})

})

}

/* POPOLA FILTRI */

function populateFilters(){

let cats=new Set()
let locs=new Set()

vehicles.forEach(v=>{

if(v.category) cats.add(v.category)
if(v.location) locs.add(v.location)

})

cats.forEach(c=>{

let opt=document.createElement("option")
opt.value=c
opt.text=c

document.getElementById("categoryFilter").appendChild(opt)

})

locs.forEach(l=>{

let opt=document.createElement("option")
opt.value=l
opt.text=l

document.getElementById("locationFilter").appendChild(opt)

})

}

/* FILTRI */

function applyFilters(){

let month=parseInt(document.getElementById("monthFilter").value)

let category=document.getElementById("categoryFilter").value

let location=document.getElementById("locationFilter").value

let start=new Date(2025,month-1,1)

let end=new Date(2025,month,0)

filtered=[]

vehicles.forEach(v=>{

let dateIn=parseDate(v.dateIn)
let dateOut=parseDate(v.dateOut)

if(!dateIn) return

if(dateIn>end) return

if(dateOut && dateOut<start) return

if(category!=="all" && v.category!==category) return

if(location!=="all" && v.location!==location) return

v.total=v.canone+v.assicurazione

filtered.push(v)

})

updateKPIs()

renderTable()

renderChart()

}

/* KPI */

function updateKPIs(){

let c=0
let a=0

filtered.forEach(v=>{

c+=v.canone
a+=v.assicurazione

})

document.getElementById("kpiCanone").innerText=c
document.getElementById("kpiAssicurazione").innerText=a
document.getElementById("kpiTotale").innerText=c+a
document.getElementById("kpiCount").innerText=filtered.length

}

/* TABELLA */

function renderTable(){

let tbody=document.querySelector("#table tbody")

tbody.innerHTML=""

filtered.forEach(v=>{

tbody.innerHTML+=`
<tr>
<td>${v.plate}</td>
<td>${v.category||""}</td>
<td>${v.location}</td>
<td>${v.canone}</td>
<td>${v.assicurazione}</td>
<td>${v.total}</td>
</tr>
`

})

}

/* GRAFICO */

function renderChart(){

let map={}

filtered.forEach(v=>{

if(!map[v.location]) map[v.location]=0

map[v.location]+=v.total

})

let labels=Object.keys(map)

let values=Object.values(map)

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:labels,
datasets:[{
label:"Costo per sede",
data:values
}]
}

})

}

/* EXPORT */

function exportCSV(){

let csv="Targa,Categoria,Sede,Canone,Assicurazione,Totale\n"

filtered.forEach(v=>{

csv+=`${v.plate},${v.category},${v.location},${v.canone},${v.assicurazione},${v.total}\n`

})

let blob=new Blob([csv])

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url

a.download="export_flotta.csv"

a.click()

}

</script>

</body>
</html>
