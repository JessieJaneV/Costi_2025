<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Dashboard Costi Flotta</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:30px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.filters{
display:flex;
gap:20px;
margin-bottom:20px;
}

select,input{
padding:8px;
border-radius:5px;
border:1px solid #ccc;
}

.total{
font-size:24px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Dashboard Costi Flotta</h1>

<div class="card filters">

<select id="categoryFilter">
<option value="all">Tutte le categorie</option>
</select>

<input type="date" id="startDate">
<input type="date" id="endDate">

<button onclick="applyFilters()">Filtra</button>

</div>

<div class="card">
Totale costi:
<div class="total" id="totalCost">€0</div>
</div>

<div class="card">
<canvas id="costChart"></canvas>
</div>

</div>

<script>

let rawData = []
let chart

Papa.parse("FLOTTA_3.csv",{
download:true,
header:true,
delimiter:";",
complete:function(results){

rawData = results.data

populateCategoryFilter()

applyFilters()

}
})

function populateCategoryFilter(){

let categories = [...new Set(rawData.map(x => x.category))]

let select = document.getElementById("categoryFilter")

categories.forEach(cat=>{
if(cat){
let opt = document.createElement("option")
opt.value = cat
opt.text = cat
select.appendChild(opt)
}
})

}

function applyFilters(){

let category = document.getElementById("categoryFilter").value
let startDate = document.getElementById("startDate").value
let endDate = document.getElementById("endDate").value

let filtered = rawData.filter(row => {

if(!row.category) return false

if(category !== "all" && row.category !== category) return false

return true

})

let total = 0
let categoryCosts = {}

filtered.forEach(row=>{

let cost = parseFloat(row[" Canone imponibile "]) || 0

total += cost

if(!categoryCosts[row.category])
categoryCosts[row.category] = 0

categoryCosts[row.category] += cost

})

document.getElementById("totalCost").innerText =
"€ " + total.toLocaleString()

updateChart(categoryCosts)

}

function updateChart(data){

let labels = Object.keys(data)
let values = Object.values(data)

if(chart) chart.destroy()

chart = new Chart(document.getElementById("costChart"),{

type:"bar",

data:{
labels:labels,
datasets:[{
label:"Costi per categoria",
data:values
}]
}

})

}

</script>

</body>
</html>
