<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<title>Dashboard Flotta</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:30px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.kpi-container{
display:flex;
gap:20px;
}

.kpi{
flex:1;
}

.kpi-title{
font-size:14px;
}

.kpi-value{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Dashboard Flotta 2025</h2>

<div class="card">

<label>Mese</label>

<select id="monthFilter">
<option value="all">Tutti</option>
<option value="1">Gennaio</option>
<option value="2">Febbraio</option>
<option value="3">Marzo</option>
<option value="4">Aprile</option>
<option value="5">Maggio</option>
<option value="6">Giugno</option>
<option value="7">Luglio</option>
<option value="8">Agosto</option>
<option value="9">Settembre</option>
<option value="10">Ottobre</option>
<option value="11">Novembre</option>
<option value="12">Dicembre</option>
</select>

<button onclick="applyFilters()">Aggiorna</button>

</div>

<div class="kpi-container">

<div class="card kpi">
<div class="kpi-title">Numero Veicoli</div>
<div class="kpi-value" id="kpiVehicles">0</div>
</div>

<div class="card kpi">
<div class="kpi-title">Canone Imponibile</div>
<div class="kpi-value" id="kpiCanone">€0</div>
</div>

<div class="card kpi">
<div class="kpi-title">Assicurazione</div>
<div class="kpi-value" id="kpiAssicurazione">€0</div>
</div>

<div class="card kpi">
<div class="kpi-title">Costo Totale</div>
<div class="kpi-value" id="kpiTotale">€0</div>
</div>

</div>

<div class="card">
<canvas id="trendChart"></canvas>
</div>

</div>

<script>

let rawData=[]
let columnMap={}

let trendChart

/* NORMALIZZA STRINGHE */

function normalize(text){

return text
.toLowerCase()
.trim()
.replace(/_/g," ")
.replace(/\s+/g," ")

}

/* PARSE EURO */

function parseMoney(v){

if(!v) return 0

let value=String(v)
.replace("€","")
.replace(",",".")
.replace(/\s/g,"")
.trim()

let num=parseFloat(value)

if(isNaN(num)) return 0

return num

}

/* IDENTIFICA COLONNE */

function detectColumns(headers){

headers.forEach(h=>{

let name=normalize(h)

if(name.includes("canone imponibile"))
columnMap.canone=h

if(name.includes("assicurazione"))
columnMap.assicurazione=h

if(name.includes("date in"))
columnMap.datein=h

if(name.includes("date out"))
columnMap.dateout=h

if(name.includes("plate") || name.includes("targa"))
columnMap.plate=h

})

}

/* LOAD CSV */

Papa.parse("FLOTTA_3.csv",{

download:true,
header:true,
delimiter:";",
skipEmptyLines:true,

complete:function(results){

let headers=Object.keys(results.data[0])

detectColumns(headers)

rawData=results.data

applyFilters()

}

})

/* FILTRI */

function applyFilters(){

let month=document.getElementById("monthFilter").value

let totalCanone=0
let totalAssicurazione=0

let monthlyCosts=Array(12).fill(0)

let vehiclesSet=new Set()

rawData.forEach(row=>{

let canone=parseMoney(row[columnMap.canone])
let assicurazione=parseMoney(row[columnMap.assicurazione])

let dateIn=row[columnMap.datein]?new Date(row[columnMap.datein]):null
let dateOut=row[columnMap.dateout]?new Date(row[columnMap.dateout]):null

let plate=row[columnMap.plate]

if(!dateIn) return

if(month!="all"){

let m=parseInt(month)

let start=new Date(2025,m-1,1)
let end=new Date(2025,m,0)

if(dateIn>end) return
if(dateOut && dateOut<start) return

let daysMonth=end.getDate()

let startActive=new Date(Math.max(dateIn,start))
let endActive=dateOut?new Date(Math.min(dateOut,end)):end

let daysActive=Math.floor((endActive-startActive)/(1000*60*60*24))+1

let prorata=daysActive/daysMonth

totalCanone+=canone*prorata
totalAssicurazione+=assicurazione*prorata

vehiclesSet.add(plate)

}else{

for(let m=1;m<=12;m++){

let start=new Date(2025,m-1,1)
let end=new Date(2025,m,0)

if(dateIn>end) continue
if(dateOut && dateOut<start) continue

let daysMonth=end.getDate()

let startActive=new Date(Math.max(dateIn,start))
let endActive=dateOut?new Date(Math.min(dateOut,end)):end

let daysActive=Math.floor((endActive-startActive)/(1000*60*60*24))+1

let prorata=daysActive/daysMonth

totalCanone+=canone*prorata
totalAssicurazione+=assicurazione*prorata

monthlyCosts[m-1]+=(canone+assicurazione)*prorata

}

vehiclesSet.add(plate)

}

})

let total=totalCanone+totalAssicurazione

document.getElementById("kpiVehicles").innerText=vehiclesSet.size
document.getElementById("kpiCanone").innerText="€ "+totalCanone.toFixed(0)
document.getElementById("kpiAssicurazione").innerText="€ "+totalAssicurazione.toFixed(0)
document.getElementById("kpiTotale").innerText="€ "+total.toFixed(0)

updateChart(monthlyCosts)

}

/* GRAFICO */

function updateChart(data){

if(trendChart) trendChart.destroy()

trendChart=new Chart(document.getElementById("trendChart"),{

type:"line",

data:{
labels:["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"],
datasets:[{
label:"Costi",
data:data
}]
}

})

}

</script>

</body>
</html>
