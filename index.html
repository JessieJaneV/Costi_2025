<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<title>Dashboard Flotta 2025</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:30px;
}

.container{
max-width:1300px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.filters{
display:flex;
gap:15px;
flex-wrap:wrap;
align-items:center;
}

.kpi-container{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.kpi{
flex:1;
min-width:200px;
}

.kpi-title{
font-size:14px;
}

.kpi-value{
font-size:28px;
font-weight:bold;
margin-top:8px;
}

select,button{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
cursor:pointer;
}

button{
background:#2b7cff;
color:white;
border:none;
}

button.reset{
background:#777;
}

</style>

</head>

<body>

<div class="container">

<h2>Dashboard Costi Flotta 2025</h2>

<div class="card filters">

<label>Mese</label>

<select id="monthFilter">
<option value="all">Tutti</option>
<option value="1">Gennaio</option>
<option value="2">Febbraio</option>
<option value="3">Marzo</option>
<option value="4">Aprile</option>
<option value="5">Maggio</option>
<option value="6">Giugno</option>
<option value="7">Luglio</option>
<option value="8">Agosto</option>
<option value="9">Settembre</option>
<option value="10">Ottobre</option>
<option value="11">Novembre</option>
<option value="12">Dicembre</option>
</select>

<label>Categoria</label>

<select id="categoryFilter">
<option value="all">Tutte</option>
</select>

<button onclick="applyFilters()">Aggiorna</button>
<button class="reset" onclick="resetFilters()">Reset</button>
<button onclick="exportCSV()">Export CSV</button>

</div>

<div class="kpi-container">

<div class="card kpi">
<div class="kpi-title">Numero Veicoli</div>
<div class="kpi-value" id="kpiVehicles">0</div>
</div>

<div class="card kpi">
<div class="kpi-title">Canone Imponibile</div>
<div class="kpi-value" id="kpiCanone">€0</div>
</div>

<div class="card kpi">
<div class="kpi-title">Assicurazione</div>
<div class="kpi-value" id="kpiAssicurazione">€0</div>
</div>

<div class="card kpi">
<div class="kpi-title">Costo Totale</div>
<div class="kpi-value" id="kpiTotale">€0</div>
</div>

</div>

<div class="card">
<canvas id="trendChart"></canvas>
</div>

</div>

<script>

let rawData=[]
let filteredData=[]
let trendChart

/* NORMALIZZA CHIAVI CSV */

function normalizeKey(key){
return key.toLowerCase().trim()
}

/* PARSE EURO SICURO */

function parseMoney(v){

if(!v) return 0

let value = String(v)
.replace("€","")
.replace(",",".")
.replace(/\s/g,"")
.trim()

let num=parseFloat(value)

if(isNaN(num)) return 0

return num

}

/* LOAD CSV */

Papa.parse("FLOTTA_3.csv",{

download:true,
header:true,
delimiter:";",
skipEmptyLines:true,

complete:function(results){

rawData = results.data.map(row=>{

let clean={}

Object.keys(row).forEach(key=>{
clean[normalizeKey(key)] = row[key]
})

return clean

})

populateCategoryFilter()
applyFilters()

}

})

/* FILTRO CATEGORIE */

function populateCategoryFilter(){

let categories=[...new Set(rawData.map(x=>x.category))]

let select=document.getElementById("categoryFilter")

categories.forEach(cat=>{

if(!cat) return

let opt=document.createElement("option")
opt.value=cat
opt.text=cat

select.appendChild(opt)

})

}

/* RESET */

function resetFilters(){

document.getElementById("monthFilter").value="all"
document.getElementById("categoryFilter").value="all"

applyFilters()

}

/* FILTRI */

function applyFilters(){

let month=document.getElementById("monthFilter").value
let category=document.getElementById("categoryFilter").value

filteredData = rawData.filter(row=>{

let dateIn=row["date in"] ? new Date(row["date in"]) : null
let dateOut=row["date out"] ? new Date(row["date out"]) : null

if(!dateIn) return false

if(category!=="all" && row.category!==category)
return false

if(month==="all") return true

let start=new Date(2025,month-1,1)
let end=new Date(2025,month,0)

if(dateIn>end) return false
if(dateOut && dateOut<start) return false

return true

})

calculateDashboard(filteredData,month,category)

}

/* CALCOLO KPI */

function calculateDashboard(data,month,category){

let totalCanone=0
let totalAssicurazione=0

let monthlyCosts=Array(12).fill(0)

/* COSTI */

data.forEach(row=>{

let canoneBase=parseMoney(row["canone imponibile"])
let assicurazioneBase=parseMoney(row["canone assicurazione"])

let dateIn=row["date in"] ? new Date(row["date in"]) : null
let dateOut=row["date out"] ? new Date(row["date out"]) : null

if(!dateIn) return

if(month!=="all"){

let m=parseInt(month)

let start=new Date(2025,m-1,1)
let end=new Date(2025,m,0)

let daysMonth=end.getDate()

let startActive=new Date(Math.max(dateIn,start))
let endActive=dateOut?new Date(Math.min(dateOut,end)):end

let daysActive=Math.floor((endActive-startActive)/(1000*60*60*24))+1

let prorata=daysActive/daysMonth

totalCanone+=canoneBase*prorata
totalAssicurazione+=assicurazioneBase*prorata

}else{

for(let m=1;m<=12;m++){

let start=new Date(2025,m-1,1)
let end=new Date(2025,m,0)

if(dateIn>end) continue
if(dateOut && dateOut<start) continue

let daysMonth=end.getDate()

let startActive=new Date(Math.max(dateIn,start))
let endActive=dateOut?new Date(Math.min(dateOut,end)):end

let daysActive=Math.floor((endActive-startActive)/(1000*60*60*24))+1

let prorata=daysActive/daysMonth

let cost=(canoneBase+assicurazioneBase)*prorata

totalCanone+=canoneBase*prorata
totalAssicurazione+=assicurazioneBase*prorata

monthlyCosts[m-1]+=cost

}

}

})

/* VEICOLI */

let vehicles

if(month==="all"){

let monthlyFleet=[]

for(let m=1;m<=12;m++){

let start=new Date(2025,m-1,1)
let end=new Date(2025,m,0)

let set=new Set()

rawData.forEach(row=>{

if(category!=="all" && row.category!==category) return

let plate=row["licence plate"]||row["license_plate"]
if(!plate) return

let dateIn=row["date in"] ? new Date(row["date in"]) : null
let dateOut=row["date out"] ? new Date(row["date out"]) : null

if(!dateIn) return
if(dateIn>end) return
if(dateOut && dateOut<start) return

set.add(plate)

})

monthlyFleet.push(set.size)

}

let sum=monthlyFleet.reduce((a,b)=>a+b,0)

vehicles=Math.round(sum/12)

}else{

let set=new Set()

data.forEach(row=>{

let plate=row["licence plate"]||row["license_plate"]
if(plate) set.add(plate)

})

vehicles=set.size

}

let total=totalCanone+totalAssicurazione

document.getElementById("kpiVehicles").innerText=vehicles
document.getElementById("kpiCanone").innerText="€ "+totalCanone.toLocaleString()
document.getElementById("kpiAssicurazione").innerText="€ "+totalAssicurazione.toLocaleString()
document.getElementById("kpiTotale").innerText="€ "+total.toLocaleString()

updateChart(monthlyCosts)

}

/* GRAFICO */

function updateChart(monthlyCosts){

if(trendChart) trendChart.destroy()

trendChart=new Chart(document.getElementById("trendChart"),{

type:"line",

data:{
labels:["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"],
datasets:[{
label:"Trend costi",
data:monthlyCosts
}]
}

})

}

/* EXPORT CSV */

function exportCSV(){

if(!filteredData.length){
alert("Nessun dato")
return
}

let csv="Targa;Categoria;Canone;Assicurazione\n"

filteredData.forEach(row=>{

let plate=row["licence plate"]||row["license_plate"]||""
let cat=row.category||""

let canone=parseMoney(row["canone imponibile"])
let assicurazione=parseMoney(row["canone assicurazione"])

csv+=`${plate};${cat};${canone};${assicurazione}\n`

})

let blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"})

let link=document.createElement("a")
link.href=URL.createObjectURL(blob)
link.download="export_flotta.csv"
link.click()

}

</script>

</body>
</html>
