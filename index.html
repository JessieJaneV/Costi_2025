<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<title>Dashboard Flotta 2025</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:30px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.filters{
display:flex;
gap:15px;
flex-wrap:wrap;
align-items:center;
}

.kpi-container{
display:flex;
gap:20px;
}

.kpi{
flex:1;
}

.kpi-value{
font-size:28px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
}

select,button{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
cursor:pointer;
}

button{
background:#2b7cff;
color:white;
border:none;
}

button.reset{
background:#888;
}

</style>

</head>

<body>

<div class="container">

<h2>Dashboard Flotta 2025</h2>

<div class="card filters">

<label>Mese</label>

<select id="monthFilter">

<option value="all">Tutti i mesi</option>

<option value="1">Gennaio</option>
<option value="2">Febbraio</option>
<option value="3">Marzo</option>
<option value="4">Aprile</option>
<option value="5">Maggio</option>
<option value="6">Giugno</option>
<option value="7">Luglio</option>
<option value="8">Agosto</option>
<option value="9">Settembre</option>
<option value="10">Ottobre</option>
<option value="11">Novembre</option>
<option value="12">Dicembre</option>

</select>

<label>Categoria</label>

<select id="categoryFilter">
<option value="all">Tutte le categorie</option>
</select>

<button onclick="applyFilters()">Aggiorna</button>

<button class="reset" onclick="resetFilters()">Reset filtri</button>

<button onclick="exportCSV()">Esporta CSV</button>

</div>

<div class="kpi-container">

<div class="card kpi">
Canone
<div id="kpiCanone" class="kpi-value">€0</div>
</div>

<div class="card kpi">
Assicurazione
<div id="kpiAssicurazione" class="kpi-value">€0</div>
</div>

<div class="card kpi">
Totale
<div id="kpiTotale" class="kpi-value">€0</div>
</div>

<div class="card kpi">
Veicoli
<div id="kpiVeicoli" class="kpi-value">0</div>
</div>

</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">

<table id="table">

<thead>
<tr>
<th>Targa</th>
<th>Categoria</th>
<th>Canone</th>
<th>Assicurazione</th>
<th>Totale</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

let fleet=[]
let filtered=[]
let chart

/* CARICA CSV */

Papa.parse("FLOTTA_3.csv",{

download:true,
header:true,
delimiter:";",

complete:(res)=>{

fleet=res.data

populateFilters()

applyFilters()

}

})

/* POPOLA CATEGORIE */

function populateFilters(){

let catSelect=document.getElementById("categoryFilter")

catSelect.innerHTML='<option value="all">Tutte le categorie</option>'

let categories=new Set()

fleet.forEach(r=>{

if(r.category){
categories.add(r.category)
}

})

categories.forEach(c=>{

let opt=document.createElement("option")
opt.value=c
opt.text=c

catSelect.appendChild(opt)

})

}

/* RESET FILTRI */

function resetFilters(){

document.getElementById("monthFilter").value="all"
document.getElementById("categoryFilter").value="all"

applyFilters()

}

/* FILTRI PRINCIPALI */

function applyFilters(){

let month=document.getElementById("monthFilter").value
let category=document.getElementById("categoryFilter").value

filtered=[]

fleet.forEach(r=>{

let plate=String(r["license_plate"]||"").trim().toUpperCase()

if(!plate) return

let dateIn=r["Date In"]?new Date(r["Date In"]):null
let dateOut=r["Date Out"]?new Date(r["Date Out"]):null

if(!dateIn) return

if(month!=="all"){

let start=new Date(2025,month-1,1)
let end=new Date(2025,month,0)

if(dateIn>end) return
if(dateOut && dateOut<start) return

}

if(category!=="all" && r.category!==category) return

let canone=parseFloat(String(r[" Canone imponibile "]||"").replace(",","."))||0

let assicurazione=parseFloat(String(r[" Canone assicurazione "]||"").replace(",","."))||0

filtered.push({

plate:plate,
category:r.category,
canone:canone,
assicurazione:assicurazione,
totale:canone+assicurazione

})

})

updateKPIs()

renderTable()

renderChart()

}

/* KPI */

function updateKPIs(){

let c=0
let a=0

filtered.forEach(v=>{

c+=v.canone
a+=v.assicurazione

})

function updateKPIs(){

let c=0
let a=0

filtered.forEach(v=>{

c+=v.canone
a+=v.assicurazione

})

let t=c+a

document.getElementById("kpiCanone").innerText="€ "+c.toLocaleString()
document.getElementById("kpiAssicurazione").innerText="€ "+a.toLocaleString()
document.getElementById("kpiTotale").innerText="€ "+t.toLocaleString()

/* CALCOLO VEICOLI */

let month=document.getElementById("monthFilter").value
let category=document.getElementById("categoryFilter").value

/* MEDIA ANNUA */

if(month==="all" && category==="all"){

let monthlyCounts=[]

for(let m=1;m<=12;m++){

let start=new Date(2025,m-1,1)
let end=new Date(2025,m,0)

let set=new Set()

fleet.forEach(r=>{

let plate=String(r["license_plate"]||"").trim().toUpperCase()

if(!plate) return

let dateIn=r["Date In"]?new Date(r["Date In"]):null
let dateOut=r["Date Out"]?new Date(r["Date Out"]):null

if(!dateIn) return

if(dateIn>end) return
if(dateOut && dateOut<start) return

set.add(plate)

})

monthlyCounts.push(set.size)

}

let sum=monthlyCounts.reduce((a,b)=>a+b,0)

let media=Math.round(sum/12)

document.getElementById("kpiVeicoli").innerText=media

}

/* FILTRI ATTIVI */

else{

document.getElementById("kpiVeicoli").innerText=filtered.length

}

}
/* TABELLA */

function renderTable(){

let tbody=document.querySelector("#table tbody")

tbody.innerHTML=""

filtered.forEach(v=>{

tbody.innerHTML+=`

<tr>
<td>${v.plate}</td>
<td>${v.category||""}</td>
<td>${v.canone}</td>
<td>${v.assicurazione}</td>
<td>${v.totale}</td>
</tr>

`

})

}

/* GRAFICO */

function renderChart(){

let map={}

filtered.forEach(v=>{

if(!map[v.category]) map[v.category]=0

map[v.category]+=v.totale

})

let labels=Object.keys(map)
let values=Object.values(map)

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:labels,
datasets:[{
label:"Costo per categoria",
data:values
}]
}

})

}

/* EXPORT CSV */

function exportCSV(){

let months=[
"Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno",
"Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"
]

let csv="Mese;Targa;Categoria;Canone;Assicurazione;Totale\n"

fleet.forEach(r=>{

let plate=String(r["license_plate"]||"").trim().toUpperCase()

if(!plate) return

let dateIn=r["Date In"]?new Date(r["Date In"]):null
let dateOut=r["Date Out"]?new Date(r["Date Out"]):null

if(!dateIn) return

let canone=parseFloat(String(r[" Canone imponibile "]||"").replace(",","."))||0
let assicurazione=parseFloat(String(r[" Canone assicurazione "]||"").replace(",","."))||0

for(let m=1;m<=12;m++){

let start=new Date(2025,m-1,1)
let end=new Date(2025,m,0)

if(dateIn>end) continue
if(dateOut && dateOut<start) continue

csv+=`${months[m-1]};${plate};${r.category||""};${canone};${assicurazione};${canone+assicurazione}\n`

}

})

let blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"})

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url
a.download="export_flotta_mensile.csv"

a.click()

}
</script>

</body>
</html>
