<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<title>Dashboard Costi Flotta 2025</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:30px;
}

.container{
max-width:1400px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.filters{
display:flex;
gap:20px;
flex-wrap:wrap;
align-items:center;
}

.kpi-container{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.kpi{
flex:1;
min-width:180px;
}

.kpi-title{
font-size:14px;
}

.kpi-value{
font-size:28px;
font-weight:bold;
margin-top:8px;
}

.charts{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
}

select,button{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
cursor:pointer;
}

button{
background:#2b7cff;
color:white;
border:none;
}

button.reset{
background:#777;
}

</style>

</head>

<body>

<div class="container">

<h1>Dashboard Costi Flotta 2025</h1>

<div class="card filters">

<label>Mese</label>

<select id="monthFilter">
<option value="all">Tutti i mesi</option>
<option value="1">Gennaio</option>
<option value="2">Febbraio</option>
<option value="3">Marzo</option>
<option value="4">Aprile</option>
<option value="5">Maggio</option>
<option value="6">Giugno</option>
<option value="7">Luglio</option>
<option value="8">Agosto</option>
<option value="9">Settembre</option>
<option value="10">Ottobre</option>
<option value="11">Novembre</option>
<option value="12">Dicembre</option>
</select>

<label>Categoria</label>

<select id="categoryFilter">
<option value="all">Tutte</option>
</select>

<button onclick="applyFilters()">Aggiorna</button>

<button class="reset" onclick="resetFilters()">Reset filtri</button>

<button onclick="exportCSV()">Export CSV</button>

</div>

<div class="kpi-container">

<div class="card kpi">
<div class="kpi-title">Numero Veicoli</div>
<div class="kpi-value" id="kpiVehicles">0</div>
</div>

<div class="card kpi">
<div class="kpi-title">Canone Imponibile</div>
<div class="kpi-value" id="kpiCanone">€0</div>
</div>

<div class="card kpi">
<div class="kpi-title">Assicurazione</div>
<div class="kpi-value" id="kpiAssicurazione">€0</div>
</div>

<div class="card kpi">
<div class="kpi-title">Costo Totale</div>
<div class="kpi-value" id="kpiTotale">€0</div>
</div>

<div class="card kpi">
<div class="kpi-title">Costo Medio Veicolo</div>
<div class="kpi-value" id="kpiAverage">€0</div>
</div>

</div>

<div class="charts">

<div class="card">
<canvas id="costCategoryChart"></canvas>
</div>

<div class="card">
<canvas id="vehiclesCategoryChart"></canvas>
</div>

</div>

<div class="card">
<canvas id="trendChart"></canvas>
</div>

<div class="card">

<h3>Costi per Veicolo</h3>

<table>

<thead>
<tr>
<th>Targa</th>
<th>Categoria</th>
<th>Canone</th>
<th>Assicurazione</th>
<th>Totale</th>
</tr>
</thead>

<tbody id="vehicleTable"></tbody>

</table>

</div>

</div>

<script>

let rawData=[]
let filteredData=[]
let costCategoryChart
let vehiclesCategoryChart
let trendChart

Papa.parse("FLOTTA_3.csv",{

download:true,
header:true,
delimiter:";",

complete:function(results){

rawData=results.data

populateCategoryFilter()

applyFilters()

}

})

function populateCategoryFilter(){

let categories=[...new Set(rawData.map(x=>x.category))]

let select=document.getElementById("categoryFilter")

categories.forEach(cat=>{

if(cat){

let opt=document.createElement("option")
opt.value=cat
opt.text=cat

select.appendChild(opt)

}

})

}

function parseMoney(v){

if(!v) return 0

return parseFloat(
String(v)
.replace("€","")
.replace(",",".")
.replace(/\s/g,"")
) || 0

}

function resetFilters(){

document.getElementById("monthFilter").value="all"
document.getElementById("categoryFilter").value="all"

applyFilters()

}

function applyFilters(){

let month=document.getElementById("monthFilter").value
let category=document.getElementById("categoryFilter").value

filteredData=rawData.filter(row=>{

let dateIn=row["Date In"] ? new Date(row["Date In"]) : null
let dateOut=row["Date Out"] ? new Date(row["Date Out"]) : null

if(!dateIn) return false

if(category!=="all" && row.category!==category)
return false

if(month==="all") return true

let startDate=new Date(2025,month-1,1)
let endDate=new Date(2025,month,0)

if(dateIn>endDate) return false
if(dateOut && dateOut<startDate) return false

return true

})

calculateDashboard(filteredData,month)

}

function calculateDashboard(data,month){

let totalCanone=0
let totalAssicurazione=0

let categoryCosts={}
let categoryVehicles={}

let monthlyCosts=Array(12).fill(0)

let vehicleMonthlyCount=Array(12).fill(0)

let tableHTML=""

data.forEach(row=>{

let plate=row["license_plate"]

let canone=parseMoney(row[" Canone imponibile "])
let assicurazione=parseMoney(row[" Canone assicurazione "])

let total=canone+assicurazione

let dateIn=row["Date In"] ? new Date(row["Date In"]) : null
let dateOut=row["Date Out"] ? new Date(row["Date Out"]) : null

if(month!=="all"){

let m=parseInt(month)

let startDate=new Date(2025,m-1,1)
let endDate=new Date(2025,m,0)

let daysMonth=endDate.getDate()

let start=Math.max(dateIn,startDate)
let end=dateOut?Math.min(dateOut,endDate):endDate

let daysActive=(end-start)/(1000*60*60*24)+1

let prorata=daysActive/daysMonth

canone*=prorata
assicurazione*=prorata
total=canone+assicurazione

}

totalCanone+=canone
totalAssicurazione+=assicurazione

let cat=row.category || "Altro"

if(!categoryCosts[cat]) categoryCosts[cat]=0
categoryCosts[cat]+=total

if(!categoryVehicles[cat]) categoryVehicles[cat]=0
categoryVehicles[cat]++

let monthIndex=new Date(row["Date In"]).getMonth()

monthlyCosts[monthIndex]+=total
vehicleMonthlyCount[monthIndex]++

tableHTML+=`
<tr>
<td>${plate}</td>
<td>${cat}</td>
<td>${canone.toFixed(0)}</td>
<td>${assicurazione.toFixed(0)}</td>
<td>${total.toFixed(0)}</td>
</tr>
`

})

let total=totalCanone+totalAssicurazione

let vehicles

if(month==="all"){

let sum=vehicleMonthlyCount.reduce((a,b)=>a+b,0)
vehicles=Math.round(sum/12)

}else{

vehicles=data.length

}

let average=vehicles?total/vehicles:0

document.getElementById("kpiVehicles").innerText=vehicles
document.getElementById("kpiCanone").innerText="€ "+totalCanone.toLocaleString()
document.getElementById("kpiAssicurazione").innerText="€ "+totalAssicurazione.toLocaleString()
document.getElementById("kpiTotale").innerText="€ "+total.toLocaleString()
document.getElementById("kpiAverage").innerText="€ "+average.toFixed(0)

document.getElementById("vehicleTable").innerHTML=tableHTML

updateCharts(categoryCosts,categoryVehicles,monthlyCosts)

}

function updateCharts(categoryCosts,categoryVehicles,monthlyCosts){

if(costCategoryChart) costCategoryChart.destroy()

costCategoryChart=new Chart(document.getElementById("costCategoryChart"),{

type:"bar",

data:{
labels:Object.keys(categoryCosts),
datasets:[{
label:"Costo totale per categoria",
data:Object.values(categoryCosts)
}]
}

})

if(vehiclesCategoryChart) vehiclesCategoryChart.destroy()

vehiclesCategoryChart=new Chart(document.getElementById("vehiclesCategoryChart"),{

type:"bar",

data:{
labels:Object.keys(categoryVehicles),
datasets:[{
label:"Numero veicoli per categoria",
data:Object.values(categoryVehicles)
}]
}

})

if(trendChart) trendChart.destroy()

trendChart=new Chart(document.getElementById("trendChart"),{

type:"line",

data:{
labels:["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"],
datasets:[{
label:"Trend costi 2025",
data:monthlyCosts
}]
}

})

}

function exportCSV(){

if(!filteredData.length){
alert("Nessun dato da esportare")
return
}

let csv="Mese;Targa;Categoria;Canone;Assicurazione;Totale\n"

let month=document.getElementById("monthFilter").value
let monthLabel=month==="all"?"Tutti":month

filteredData.forEach(row=>{

let plate=row["license_plate"]
let cat=row["category"]

let canone=parseMoney(row[" Canone imponibile "])
let assicurazione=parseMoney(row[" Canone assicurazione "])

let total=canone+assicurazione

csv+=`"${monthLabel}";"${plate}";"${cat}";${canone};${assicurazione};${total}\n`

})

let blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)
link.download="flotta_export.csv"
link.click()

}

</script>

</body>
</html>
