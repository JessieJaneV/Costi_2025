<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<title>Dashboard Flotta 2025</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:30px;
}

.container{
max-width:1300px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.filters{
display:flex;
gap:20px;
align-items:center;
flex-wrap:wrap;
}

.kpi-container{
display:flex;
gap:20px;
}

.kpi{
flex:1;
}

.kpi-title{
font-size:14px;
}

.kpi-value{
font-size:28px;
font-weight:bold;
}

select,button{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
}

</style>

</head>

<body>

<div class="container">

<h1>Dashboard Flotta 2025</h1>

<div class="card filters">

<label>Mese</label>

<select id="monthFilter">
<option value="1">Gennaio</option>
<option value="2">Febbraio</option>
<option value="3">Marzo</option>
<option value="4">Aprile</option>
<option value="5">Maggio</option>
<option value="6">Giugno</option>
<option value="7">Luglio</option>
<option value="8">Agosto</option>
<option value="9">Settembre</option>
<option value="10">Ottobre</option>
<option value="11">Novembre</option>
<option value="12">Dicembre</option>
</select>

<label>Categoria</label>

<select id="categoryFilter">
<option value="all">Tutte</option>
</select>

<label>Sede</label>

<select id="locationFilter">
<option value="all">Tutte</option>
</select>

<button onclick="applyFilters()">Aggiorna</button>

<button onclick="exportCSV()">Esporta CSV</button>

</div>

<div class="kpi-container">

<div class="card kpi">
<div class="kpi-title">Canone Imponibile</div>
<div class="kpi-value" id="kpiCanone">€0</div>
</div>

<div class="card kpi">
<div class="kpi-title">Assicurazione</div>
<div class="kpi-value" id="kpiAssicurazione">€0</div>
</div>

<div class="card kpi">
<div class="kpi-title">Costo Totale</div>
<div class="kpi-value" id="kpiTotale">€0</div>
</div>

<div class="card kpi">
<div class="kpi-title">Veicoli Attivi</div>
<div class="kpi-value" id="kpiVeicoli">0</div>
</div>

</div>

<div class="card">
<canvas id="locationChart"></canvas>
</div>

<div class="card">

<table id="vehicleTable">

<thead>
<tr>
<th>Targa</th>
<th>Categoria</th>
<th>Sede</th>
<th>Canone</th>
<th>Assicurazione</th>
<th>Totale</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

let rawFleet=[]
let locationMap={}
let filteredVehicles=[]
let chart

/* CARICAMENTO FILE */

Promise.all([

fetch("prenotazioni.json").then(r=>r.json()),

new Promise(resolve=>{

Papa.parse("FLOTTA_3.csv",{
download:true,
header:true,
delimiter:";",
complete:(results)=>resolve(results.data)
})

})

]).then(([jsonData,fleetData])=>{

/* MAPPA TARGA → SEDE */

jsonData.forEach(r=>{

let plate=String(r["Auto"]).trim().toUpperCase()
let location=r["Sucursal Entrega"]

if(plate && location){
locationMap[plate]=location
}

})

rawFleet=fleetData

populateFilters()

applyFilters()

})

function populateFilters(){

let categories=[...new Set(rawFleet.map(x=>x.category))]

let catSelect=document.getElementById("categoryFilter")

categories.forEach(c=>{

if(c){

let opt=document.createElement("option")
opt.value=c
opt.text=c
catSelect.appendChild(opt)

}

})

/* FILTRO SEDI */

let locations=[...new Set(Object.values(locationMap))]

let locSelect=document.getElementById("locationFilter")

locations.forEach(l=>{

let opt=document.createElement("option")
opt.value=l
opt.text=l
locSelect.appendChild(opt)

})

}

function applyFilters(){

let month=parseInt(document.getElementById("monthFilter").value)
let category=document.getElementById("categoryFilter").value
let locationFilter=document.getElementById("locationFilter").value

let startDate=new Date(2025,month-1,1)
let endDate=new Date(2025,month,0)

filteredVehicles=[]

rawFleet.forEach(row=>{

let dateIn=row["Date In"]?new Date(row["Date In"]):null
let dateOut=row["Date Out"]?new Date(row["Date Out"]):null

if(!dateIn) return

if(dateIn>endDate) return
if(dateOut && dateOut<startDate) return

if(category!=="all" && row.category!==category) return

let plate=row["license_plate"].trim().toUpperCase()

let location=locationMap[plate] || "Sconosciuta"

if(locationFilter!=="all" && location!==locationFilter) return

let canone=parseFloat(row[" Canone imponibile "])||0
let assicurazione=parseFloat(row[" Canone assicurazione "])||0

filteredVehicles.push({

plate:plate,
category:row.category,
location:location,
canone:canone,
assicurazione:assicurazione,
totale:canone+assicurazione

})

})

updateKPIs()
renderTable()
renderChart()

}

function updateKPIs(){

let canone=0
let assicurazione=0

filteredVehicles.forEach(v=>{
canone+=v.canone
assicurazione+=v.assicurazione
})

let totale=canone+assicurazione

document.getElementById("kpiCanone").innerText="€ "+canone.toLocaleString()
document.getElementById("kpiAssicurazione").innerText="€ "+assicurazione.toLocaleString()
document.getElementById("kpiTotale").innerText="€ "+totale.toLocaleString()
document.getElementById("kpiVeicoli").innerText=filteredVehicles.length

}

function renderTable(){

let tbody=document.querySelector("#vehicleTable tbody")
tbody.innerHTML=""

filteredVehicles.forEach(v=>{

tbody.innerHTML+=`
<tr>
<td>${v.plate}</td>
<td>${v.category}</td>
<td>${v.location}</td>
<td>€ ${v.canone.toLocaleString()}</td>
<td>€ ${v.assicurazione.toLocaleString()}</td>
<td>€ ${v.totale.toLocaleString()}</td>
</tr>
`

})

}

function renderChart(){

let locationCosts={}

filteredVehicles.forEach(v=>{

if(!locationCosts[v.location]){
locationCosts[v.location]=0
}

locationCosts[v.location]+=v.totale

})

let labels=Object.keys(locationCosts)
let values=Object.values(locationCosts)

if(chart) chart.destroy()

chart=new Chart(document.getElementById("locationChart"),{

type:"bar",

data:{
labels:labels,
datasets:[{
label:"Costo per sede",
data:values
}]
}

})

}

function exportCSV(){

let csv="Targa,Categoria,Sede,Canone,Assicurazione,Totale\n"

filteredVehicles.forEach(v=>{
csv+=`${v.plate},${v.category},${v.location},${v.canone},${v.assicurazione},${v.totale}\n`
})

let blob=new Blob([csv],{type:"text/csv"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="export_flotta.csv"
a.click()

}

</script>

</body>
</html>
