<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<title>Dashboard Flotta 2025</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:30px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.filters{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.kpi-container{
display:flex;
gap:20px;
}

.kpi{
flex:1;
}

.kpi-value{
font-size:28px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
}

select,button{
padding:8px;
}

</style>

</head>

<body>

<div class="container">

<h2>Dashboard Flotta 2025</h2>

<div class="card filters">

<label>Mese</label>

<select id="monthFilter">
<option value="1">Gennaio</option>
<option value="2">Febbraio</option>
<option value="3">Marzo</option>
<option value="4">Aprile</option>
<option value="5">Maggio</option>
<option value="6">Giugno</option>
<option value="7">Luglio</option>
<option value="8">Agosto</option>
<option value="9">Settembre</option>
<option value="10">Ottobre</option>
<option value="11">Novembre</option>
<option value="12">Dicembre</option>
</select>

<select id="categoryFilter">
<option value="all">Categoria</option>
</select>

<select id="locationFilter">
<option value="all">Sede</option>
</select>

<button onclick="applyFilters()">Aggiorna</button>

<button onclick="exportCSV()">Esporta CSV</button>

</div>

<div class="kpi-container">

<div class="card kpi">
Canone
<div id="kpiCanone" class="kpi-value">€0</div>
</div>

<div class="card kpi">
Assicurazione
<div id="kpiAssicurazione" class="kpi-value">€0</div>
</div>

<div class="card kpi">
Totale
<div id="kpiTotale" class="kpi-value">€0</div>
</div>

<div class="card kpi">
Veicoli
<div id="kpiVeicoli" class="kpi-value">0</div>
</div>

</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">

<table id="table">

<thead>
<tr>
<th>Targa</th>
<th>Categoria</th>
<th>Sede</th>
<th>Canone</th>
<th>Assicurazione</th>
<th>Totale</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

let fleet=[]
let locationMap={}
let vehicles=[]
let filtered=[]
let chart

/* CARICA JSON */

fetch("prenotazioni.json")
.then(r=>r.json())
.then(data=>{

data.forEach(row=>{

let plate=String(row["Auto"]||"").trim().toUpperCase()

let location=row["Sucursal Entrega"]

if(plate && location){

locationMap[plate]=location

}

})

loadFleet()

})

.catch(err=>{

console.error("Errore JSON",err)

loadFleet()

})

/* CARICA CSV */

function loadFleet(){

Papa.parse("FLOTTA_3.csv",{

download:true,
header:true,
delimiter:";",

complete:(res)=>{

fleet=res.data

prepareVehicles()

populateFilters()

applyFilters()

}

})

}

/* CREA LISTA VEICOLI */

function prepareVehicles(){

vehicles=[]

fleet.forEach(r=>{

let plate=String(r["license_plate"]||"").trim().toUpperCase()

if(!plate) return

let location=locationMap[plate] || "Sconosciuta"

vehicles.push({

plate:plate,
category:r.category,
location:location,
dateIn:r["Date In"],
dateOut:r["Date Out"],
canone:parseFloat(String(r[" Canone imponibile "]||"").replace(",","."))||0,
assicurazione:parseFloat(String(r[" Canone assicurazione "]||"").replace(",","."))||0

})

})

}

/* POPOLA FILTRI */

function populateFilters(){

let catSet=new Set()

let locSet=new Set()

vehicles.forEach(v=>{

if(v.category) catSet.add(v.category)

if(v.location) locSet.add(v.location)

})

let catSelect=document.getElementById("categoryFilter")

catSet.forEach(c=>{

let opt=document.createElement("option")

opt.value=c

opt.text=c

catSelect.appendChild(opt)

})

let locSelect=document.getElementById("locationFilter")

locSet.forEach(l=>{

let opt=document.createElement("option")

opt.value=l

opt.text=l

locSelect.appendChild(opt)

})

}

/* FILTRI */

function applyFilters(){

let month=parseInt(document.getElementById("monthFilter").value)

let category=document.getElementById("categoryFilter").value

let locationFilter=document.getElementById("locationFilter").value

let start=new Date(2025,month-1,1)

let end=new Date(2025,month,0)

filtered=[]

vehicles.forEach(v=>{

let dateIn=v.dateIn ? new Date(v.dateIn) : null

let dateOut=v.dateOut ? new Date(v.dateOut) : null

if(!dateIn) return

if(dateIn>end) return

if(dateOut && dateOut<start) return

if(category!=="all" && v.category!==category) return

if(locationFilter!=="all" && v.location!==locationFilter) return

v.totale=v.canone+v.assicurazione

filtered.push(v)

})

updateKPIs()

renderTable()

renderChart()

}

/* KPI */

function updateKPIs(){

let c=0

let a=0

filtered.forEach(v=>{

c+=v.canone

a+=v.assicurazione

})

let t=c+a

document.getElementById("kpiCanone").innerText="€ "+c.toLocaleString()

document.getElementById("kpiAssicurazione").innerText="€ "+a.toLocaleString()

document.getElementById("kpiTotale").innerText="€ "+t.toLocaleString()

document.getElementById("kpiVeicoli").innerText=filtered.length

}

/* TABELLA */

function renderTable(){

let tbody=document.querySelector("#table tbody")

tbody.innerHTML=""

filtered.forEach(v=>{

tbody.innerHTML+=`

<tr>
<td>${v.plate}</td>
<td>${v.category||""}</td>
<td>${v.location}</td>
<td>${v.canone}</td>
<td>${v.assicurazione}</td>
<td>${v.totale}</td>
</tr>

`

})

}

/* GRAFICO */

function renderChart(){

let map={}

filtered.forEach(v=>{

if(!map[v.location]) map[v.location]=0

map[v.location]+=v.totale

})

let labels=Object.keys(map)

let values=Object.values(map)

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:labels,
datasets:[{
label:"Costo per sede",
data:values
}]
}

})

}

/* EXPORT */

function exportCSV(){

let csv="Targa,Categoria,Sede,Canone,Assicurazione,Totale\n"

filtered.forEach(v=>{

csv+=`${v.plate},${v.category},${v.location},${v.canone},${v.assicurazione},${v.totale}\n`

})

let blob=new Blob([csv])

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url

a.download="export_flotta.csv"

a.click()

}

</script>

</body>
</html>
