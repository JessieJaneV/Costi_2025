<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<title>Dashboard Flotta 2025</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:30px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.filters{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.kpi-container{
display:flex;
gap:20px;
}

.kpi{
flex:1;
}

.kpi-value{
font-size:26px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
}

</style>

</head>

<body>

<div class="container">

<h2>Dashboard Flotta 2025</h2>

<div class="card filters">

<select id="monthFilter">
<option value="1">Gennaio</option>
<option value="2">Febbraio</option>
<option value="3">Marzo</option>
<option value="4">Aprile</option>
<option value="5">Maggio</option>
<option value="6">Giugno</option>
<option value="7">Luglio</option>
<option value="8">Agosto</option>
<option value="9">Settembre</option>
<option value="10">Ottobre</option>
<option value="11">Novembre</option>
<option value="12">Dicembre</option>
</select>

<select id="categoryFilter">
<option value="all">Categoria</option>
</select>

<select id="locationFilter">
<option value="all">Sede</option>
</select>

<button onclick="applyFilters()">Aggiorna</button>

<button onclick="exportCSV()">Esporta CSV</button>

</div>

<div class="kpi-container">

<div class="card kpi">
Canone
<div id="kpiCanone" class="kpi-value">€0</div>
</div>

<div class="card kpi">
Assicurazione
<div id="kpiAssicurazione" class="kpi-value">€0</div>
</div>

<div class="card kpi">
Totale
<div id="kpiTotale" class="kpi-value">€0</div>
</div>

<div class="card kpi">
Veicoli
<div id="kpiVeicoli" class="kpi-value">0</div>
</div>

</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">

<table id="table">

<thead>
<tr>
<th>Targa</th>
<th>Categoria</th>
<th>Sede</th>
<th>Canone</th>
<th>Assicurazione</th>
<th>Totale</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

let fleet=[]
let locationMap={}
let filtered=[]
let chart

/* LOAD JSON */

fetch("prenotazioni.json")
.then(r=>r.json())
.then(data=>{

console.log("JSON caricato")

if(Array.isArray(data)){

data.forEach(r=>{

let plate=String(r["Auto"]||"").trim().toUpperCase()
let loc=r["Sucursal Entrega"]

if(plate && loc){
locationMap[plate]=loc
}

})

}else{

locationMap=data

}

loadFleet()

})

.catch(e=>{
console.error("Errore JSON",e)
})

/* LOAD CSV */

function loadFleet(){

Papa.parse("FLOTTA_3.csv",{

download:true,
header:true,
delimiter:";",

complete:(res)=>{

fleet=res.data

console.log("CSV caricato",fleet.length)

populateFilters()

applyFilters()

}

})

}

function populateFilters(){

let cats=[...new Set(fleet.map(x=>x.category).filter(Boolean))]

let catSelect=document.getElementById("categoryFilter")

cats.forEach(c=>{
let opt=document.createElement("option")
opt.value=c
opt.text=c
catSelect.appendChild(opt)
})

let locations=[...new Set(Object.values(locationMap))]

let locSelect=document.getElementById("locationFilter")

locations.forEach(l=>{
let opt=document.createElement("option")
opt.value=l
opt.text=l
locSelect.appendChild(opt)
})

}

function applyFilters(){

let month=parseInt(document.getElementById("monthFilter").value)

let category=document.getElementById("categoryFilter").value

let locationFilter=document.getElementById("locationFilter").value

let start=new Date(2025,month-1,1)

let end=new Date(2025,month,0)

filtered=[]

fleet.forEach(r=>{

let plate=String(r["license_plate"]||"").trim().toUpperCase()

if(!plate) return

let dateIn=r["Date In"] ? new Date(r["Date In"]) : null
let dateOut=r["Date Out"] ? new Date(r["Date Out"]) : null

if(!dateIn) return

if(dateIn>end) return
if(dateOut && dateOut<start) return

if(category!=="all" && r.category!==category) return

let loc=locationMap[plate] || "Sconosciuta"

if(locationFilter!=="all" && loc!==locationFilter) return

let canone=parseFloat(String(r[" Canone imponibile "]||"").replace(",","."))||0

let assicurazione=parseFloat(String(r[" Canone assicurazione "]||"").replace(",","."))||0

filtered.push({

plate:plate,
category:r.category,
location:loc,
canone:canone,
assicurazione:assicurazione,
totale:canone+assicurazione

})

})

updateKPIs()
renderTable()
renderChart()

}

function updateKPIs(){

let c=0
let a=0

filtered.forEach(v=>{
c+=v.canone
a+=v.assicurazione
})

let t=c+a

document.getElementById("kpiCanone").innerText="€ "+c.toLocaleString()
document.getElementById("kpiAssicurazione").innerText="€ "+a.toLocaleString()
document.getElementById("kpiTotale").innerText="€ "+t.toLocaleString()
document.getElementById("kpiVeicoli").innerText=filtered.length

}

function renderTable(){

let tbody=document.querySelector("#table tbody")

tbody.innerHTML=""

filtered.forEach(v=>{

tbody.innerHTML+=`

<tr>
<td>${v.plate}</td>
<td>${v.category||""}</td>
<td>${v.location}</td>
<td>${v.canone}</td>
<td>${v.assicurazione}</td>
<td>${v.totale}</td>
</tr>

`

})

}

function renderChart(){

let map={}

filtered.forEach(v=>{

if(!map[v.location]) map[v.location]=0

map[v.location]+=v.totale

})

let labels=Object.keys(map)
let values=Object.values(map)

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:labels,
datasets:[{
label:"Costo per sede",
data:values
}]
}

})

}

function exportCSV(){

let csv="Targa,Categoria,Sede,Canone,Assicurazione,Totale\n"

filtered.forEach(v=>{

csv+=`${v.plate},${v.category},${v.location},${v.canone},${v.assicurazione},${v.totale}\n`

})

let blob=new Blob([csv])

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url

a.download="export_flotta.csv"

a.click()

}

</script>

</body>
</html>
